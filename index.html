<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공수 관리</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', Arial, sans-serif; background: #eef1f5; }

        /* ── 상단 바 ── */
        .topbar {
            background: #1a3a5c;
            color: white;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .topbar h1 { font-size: 1rem; letter-spacing: 2px; }
        .topbar-right { display: flex; gap: 8px; align-items: center; }
        .month-input {
            padding: 7px 9px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #1a3a5c;
            font-weight: bold;
        }
        .top-btn {
            background: rgba(255,255,255,0.18);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 7px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .top-btn:active { background: rgba(255,255,255,0.3); }

        /* ── 테이블 영역 ── */
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            border-collapse: collapse;
            background: white;
            min-width: 100%;
        }

        /* 헤더 */
        thead th {
            background: #1a3a5c;
            color: white;
            padding: 10px 3px;
            text-align: center;
            border: 1px solid #2c4f6e;
            font-size: 0.78rem;
            white-space: nowrap;
            min-width: 58px;
        }
        thead th:first-child {
            position: sticky;
            left: 0;
            z-index: 30;
            background: #112540;
            min-width: 72px;
            max-width: 90px;
            border-right: 2px solid #4a7aa8;
        }
        thead th.th-total {
            background: #1a5233;
            min-width: 48px;
        }

        /* 바디 */
        tbody td {
            border: 1px solid #dde3ea;
            padding: 5px 3px;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            min-height: 48px;
            min-width: 58px;
            line-height: 1.4;
            transition: background 0.12s;
        }
        tbody td:hover { background: #eaf4ff; }

        /* 작업자 이름 칸 (첫 번째 열) */
        tbody td:first-child {
            position: sticky;
            left: 0;
            background: #f5f7fa;
            font-weight: bold;
            font-size: 0.82rem;
            text-align: left;
            padding: 8px 8px;
            white-space: nowrap;
            z-index: 20;
            min-width: 72px;
            max-width: 90px;
            border-right: 2px solid #c5cdd8;
            cursor: pointer;
            color: #1a3a5c;
        }
        tbody td:first-child:hover { background: #e4ecf7; }

        /* 합계 칸 */
        tbody td.td-total {
            background: #e8f5e9;
            font-weight: bold;
            color: #1b5e20;
            cursor: default;
            font-size: 0.82rem;
        }
        tbody td.td-total:hover { background: #e8f5e9; }

        /* 빈 칸 점 */
        .dot { color: #d0d5dc; font-size: 1rem; }

        /* 셀 내용 */
        .cell-entry { margin: 2px 0; }
        .cell-site {
            display: block;
            font-size: 0.63rem;
            color: #34495e;
            background: #e8f0fd;
            border-radius: 3px;
            padding: 1px 4px;
            margin-bottom: 1px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 54px;
        }
        .cell-gs {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            color: #c0392b;
        }

        /* 작업자 추가 행 */
        .tr-add td {
            background: #f8fff8;
            color: #27ae60;
            font-weight: bold;
            font-size: 0.88rem;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            border-top: 2px dashed #b2dfdb;
        }
        .tr-add td:hover { background: #e8f5e9; }
        .tr-add td:first-child {
            position: sticky;
            left: 0;
            z-index: 20;
        }

        /* ── 모달 공통 ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }
        .overlay.open { display: flex; }
        .sheet {
            background: white;
            border-radius: 18px 18px 0 0;
            width: 100%;
            max-width: 520px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 22px 16px 36px;
            animation: up 0.22s ease;
        }
        @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .sheet-title { font-size: 1.05rem; font-weight: bold; color: #1a3a5c; }
        .sheet-sub { font-size: 0.82rem; color: #888; margin-top: 3px; margin-bottom: 18px; }

        /* 셀 모달 — 항목 행 */
        .entry-row {
            display: flex;
            gap: 7px;
            align-items: center;
            margin-bottom: 9px;
        }
        .entry-row input[type="text"] {
            flex: 2;
            padding: 10px 10px;
            border: 1.5px solid #dde3ea;
            border-radius: 8px;
            font-size: 0.92rem;
            outline: none;
        }
        .entry-row input[type="number"] {
            flex: 1;
            padding: 10px 6px;
            border: 1.5px solid #dde3ea;
            border-radius: 8px;
            font-size: 0.92rem;
            text-align: center;
            outline: none;
        }
        .entry-row input:focus { border-color: #4fc3f7; }
        .entry-del {
            background: #ffebee;
            color: #e53935;
            border: none;
            border-radius: 7px;
            padding: 10px 11px;
            cursor: pointer;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .btn-add-row {
            width: 100%;
            padding: 10px;
            background: #f0f8ff;
            color: #2980b9;
            border: 1.5px dashed #90caf9;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 14px;
        }

        .btn-clear {
            width: 100%;
            padding: 10px;
            background: #fff3e0;
            color: #e65100;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .row-btns { display: flex; gap: 8px; }
        .btn-cancel {
            flex: 1;
            padding: 13px;
            background: #f0f0f0;
            color: #666;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn-save {
            flex: 2;
            padding: 13px;
            background: #1a3a5c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-save:active { opacity: 0.8; }

        /* 작업자 모달 */
        .worker-btn {
            display: block;
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 9px;
            border: none;
            border-radius: 9px;
            font-size: 0.95rem;
            cursor: pointer;
            text-align: left;
        }
        .worker-btn.rename { background: #e3f2fd; color: #0d47a1; }
        .worker-btn.del    { background: #ffebee; color: #b71c1c; }

        /* 토스트 */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,20,0.88);
            color: white;
            padding: 10px 22px;
            border-radius: 22px;
            font-size: 0.88rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
            z-index: 999;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }

        /* 빈 슬롯 행 */
        .empty-slot {
            color: #c0c8d4;
            font-size: 0.75rem;
            font-style: italic;
            cursor: pointer;
        }
        .empty-slot:hover { background: #f0f8ff !important; color: #90a4b8; }
        .slot-hint { pointer-events: none; }
        .slot-cell {
            background: #fafbfc;
            cursor: default;
            border-color: #eaecef;
        }
        .slot-cell:hover { background: #fafbfc !important; }

        /* 인쇄 */
        @page { size: landscape; margin: 10mm; }
        @media print {
            .topbar, .tr-add { display: none !important; }
            .overlay { display: none !important; }
            .table-wrap { overflow: visible; }
            thead th:first-child, tbody td:first-child { position: static; }
            body { background: white; }
            table { font-size: 8pt; }
        }
    </style>
</head>
<body>

<!-- 상단 바 -->
<div class="topbar">
    <h1>공수 관리</h1>
    <div class="topbar-right">
        <input type="month" class="month-input" id="month-input">
        <button class="top-btn" onclick="openPrint()">🖨️ PDF</button>
        <button class="top-btn" onclick="openSettings()">⚙️</button>
    </div>
</div>

<!-- 메인 테이블 -->
<div class="table-wrap">
    <table id="main-table">
        <thead id="t-head"></thead>
        <tbody id="t-body"></tbody>
    </table>
</div>

<!-- 셀 편집 모달 -->
<div class="overlay" id="cell-overlay">
    <div class="sheet">
        <div class="sheet-title" id="cell-title"></div>
        <div class="sheet-sub" id="cell-sub"></div>
        <div id="entry-list"></div>
        <button class="btn-add-row" onclick="addEntryRow()">+ 현장 추가</button>
        <button class="btn-clear" id="btn-clear">이 칸 기록 전체 삭제</button>
        <div class="row-btns">
            <button class="btn-cancel" onclick="closeCell()">취소</button>
            <button class="btn-save" onclick="saveCell()">저장</button>
        </div>
    </div>
</div>

<!-- 작업자 모달 -->
<div class="overlay" id="worker-overlay">
    <div class="sheet">
        <div class="sheet-title" id="worker-title"></div>
        <div class="sheet-sub">작업자 관리</div>
        <button class="worker-btn rename" onclick="doRename()">✏️ 이름 수정</button>
        <button class="worker-btn del"    onclick="doDelete()">🗑️ 작업자 삭제 (기록 포함)</button>
        <button class="btn-cancel" style="width:100%" onclick="closeWorker()">취소</button>
    </div>
</div>

<!-- 설정/백업 모달 -->
<div class="overlay" id="settings-overlay">
    <div class="sheet">
        <div class="sheet-title">설정 / 백업</div>
        <div class="sheet-sub">데이터를 파일로 저장하거나 불러올 수 있어요</div>
        <button class="worker-btn rename" onclick="shareBackup()">💬 카카오톡으로 보내기</button>
        <button class="worker-btn rename" onclick="exportBackup()">📥 백업 저장 (파일 다운로드)</button>
        <button class="worker-btn rename" onclick="importBackup()">📤 백업 불러오기 (파일 선택)</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <div style="height:12px; border-top:1px solid #eee; margin:8px 0;"></div>
        <button class="worker-btn del" onclick="resetAll()">🗑️ 전체 초기화 (주의!)</button>
        <button class="btn-cancel" style="width:100%;margin-top:6px" onclick="closeSettings()">닫기</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── 데이터 ── */
const MIN_ROWS = 6;

function load() {
    try {
        const raw = localStorage.getItem('gongsu3');
        if (!raw) return { workers: [], entries: [] };
        return JSON.parse(raw);
    } catch { return { workers: [], entries: [] }; }
}
function save(d) { localStorage.setItem('gongsu3', JSON.stringify(d)); }

/* ── 달 유틸 ── */
function daysIn(ym) {
    const [y, m] = ym.split('-').map(Number);
    return new Date(y, m, 0).getDate();
}
function dateStr(ym, d) {
    return `${ym}-${String(d).padStart(2, '0')}`;
}
function fmtDate(ds) {
    const [y, m, d] = ds.split('-');
    return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
}

/* ── HTML 이스케이프 ── */
function h(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 테이블 렌더 ── */
let curMonth = '';
function render() {
    const data = load();
    const days = daysIn(curMonth);
    const head = document.getElementById('t-head');
    const body = document.getElementById('t-body');

    // 헤더
    let hh = '<tr><th>작업자</th>';
    for (let d = 1; d <= days; d++) hh += `<th>${d}일</th>`;
    hh += '<th class="th-total">합계</th></tr>';
    head.innerHTML = hh;

    // 바디 — 실제 작업자 + 빈 슬롯 합쳐서 최소 6행 유지
    let bh = '';
    const totalRows = Math.max(data.workers.length, MIN_ROWS);

    for (let i = 0; i < totalRows; i++) {
        const worker = data.workers[i] || null; // null = 빈 슬롯
        bh += '<tr>';

        if (worker === null) {
            // 빈 슬롯: 이름 칸 누르면 이름 입력
            bh += `<td class="empty-slot" onclick="addWorkerAtSlot()"><span class="slot-hint">탭하여 입력</span></td>`;
            for (let d = 1; d <= days; d++) bh += `<td class="slot-cell"></td>`;
            bh += `<td class="td-total"></td>`;
        } else {
            // 실제 작업자 행
            bh += `<td data-w="${h(worker)}" onclick="openWorker(this.dataset.w)">${h(worker)}</td>`;
            let total = 0;
            for (let d = 1; d <= days; d++) {
                const ds = dateStr(curMonth, d);
                const items = data.entries.filter(e => e.date === ds && e.worker === worker);
                if (items.length === 0) {
                    bh += `<td data-w="${h(worker)}" data-d="${ds}" onclick="openCell(this.dataset.w,this.dataset.d)"><span class="dot">·</span></td>`;
                } else {
                    const dTotal = items.reduce((s, e) => s + e.gongsu, 0);
                    total += dTotal;
                    const inner = items.map(e =>
                        `<div class="cell-entry"><span class="cell-site">${h(e.site)}</span><span class="cell-gs">${e.gongsu}</span></div>`
                    ).join('');
                    bh += `<td data-w="${h(worker)}" data-d="${ds}" onclick="openCell(this.dataset.w,this.dataset.d)">${inner}</td>`;
                }
            }
            bh += `<td class="td-total">${total > 0 ? total : ''}</td>`;
        }
        bh += '</tr>';
    }

    // 작업자 추가 행
    bh += `<tr class="tr-add"><td colspan="${days + 2}" onclick="addWorker()">＋ 작업자 추가</td></tr>`;
    body.innerHTML = bh;
}

/* ── 작업자 추가 ── */
function addWorker() {
    const name = prompt('작업자 이름을 입력하세요');
    if (!name || !name.trim()) return;
    const data = load();
    if (data.workers.includes(name.trim())) { toast('이미 있는 이름이에요'); return; }
    data.workers.push(name.trim());
    save(data);
    render();
}

function addWorkerAtSlot() {
    const name = prompt('작업자 이름을 입력하세요');
    if (!name || !name.trim()) return;
    const data = load();
    if (data.workers.includes(name.trim())) { toast('이미 있는 이름이에요'); return; }
    data.workers.push(name.trim());
    save(data);
    render();
}

/* ── 작업자 모달 ── */
let wTarget = '';
function openWorker(name) {
    wTarget = name;
    document.getElementById('worker-title').textContent = name;
    document.getElementById('worker-overlay').classList.add('open');
}
function closeWorker() { document.getElementById('worker-overlay').classList.remove('open'); }
function doRename() {
    const newName = prompt('새 이름을 입력하세요', wTarget);
    if (!newName || !newName.trim() || newName.trim() === wTarget) { closeWorker(); return; }
    const data = load();
    const i = data.workers.indexOf(wTarget);
    if (i >= 0) data.workers[i] = newName.trim();
    data.entries.forEach(e => { if (e.worker === wTarget) e.worker = newName.trim(); });
    save(data);
    closeWorker();
    render();
    toast('이름이 수정됐어요');
}
function doDelete() {
    if (!confirm(`"${wTarget}" 작업자와 모든 기록을 삭제할까요?`)) return;
    const data = load();
    data.workers = data.workers.filter(w => w !== wTarget);
    data.entries = data.entries.filter(e => e.worker !== wTarget);
    save(data);
    closeWorker();
    render();
    toast('삭제됐어요');
}

/* ── 셀 모달 ── */
let cWorker = '', cDate = '';
function openCell(worker, date) {
    cWorker = worker;
    cDate = date;
    document.getElementById('cell-title').textContent = worker;
    document.getElementById('cell-sub').textContent = fmtDate(date);

    const data = load();
    const items = data.entries.filter(e => e.date === date && e.worker === worker);
    const list = document.getElementById('entry-list');
    list.innerHTML = '';
    if (items.length > 0) {
        items.forEach(e => addEntryRow(e.site, e.gongsu));
    } else {
        addEntryRow();
    }
    document.getElementById('cell-overlay').classList.add('open');
}
function closeCell() { document.getElementById('cell-overlay').classList.remove('open'); }

function addEntryRow(site = '', gongsu = '') {
    const list = document.getElementById('entry-list');
    const div = document.createElement('div');
    div.className = 'entry-row';
    div.innerHTML = `
        <input type="text" placeholder="현장명 (예: A현장)" value="${h(site)}">
        <input type="number" placeholder="공수" step="0.5" min="0.5" max="9" value="${gongsu}">
        <button class="entry-del" onclick="this.parentElement.remove()">✕</button>
    `;
    list.appendChild(div);
    if (!site) div.querySelector('input').focus();
}

document.getElementById('btn-clear').onclick = function () {
    if (!confirm('이 칸의 기록을 전부 삭제할까요?')) return;
    const data = load();
    data.entries = data.entries.filter(e => !(e.date === cDate && e.worker === cWorker));
    save(data);
    closeCell();
    render();
    toast('삭제됐어요');
};

function saveCell() {
    const rows = document.querySelectorAll('#entry-list .entry-row');
    const newItems = [];
    let err = false;

    rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const site   = inputs[0].value.trim();
        const gongsu = parseFloat(inputs[1].value);
        if (!site || isNaN(gongsu) || gongsu <= 0) { err = true; return; }
        newItems.push({ date: cDate, worker: cWorker, site, gongsu });
    });

    if (err) { toast('빈 칸이 있거나 공수가 잘못됐어요'); return; }

    const data = load();
    data.entries = data.entries.filter(e => !(e.date === cDate && e.worker === cWorker));
    data.entries = data.entries.concat(newItems);
    save(data);
    closeCell();
    render();
    toast('저장됐어요 ✓');
}

/* ── PDF 인쇄 ── */
function openPrint() {
    const data = load();
    const days = daysIn(curMonth);
    const [y, m] = curMonth.split('-');
    const workers = data.workers; // 빈 슬롯 제외, 실제 작업자만

    // 헤더 행
    let thead = '<tr><th class="name-col">작업자</th>';
    for (let d = 1; d <= days; d++) thead += `<th>${d}</th>`;
    thead += '<th class="total-col">합계</th></tr>';

    // 바디 행
    let tbody = '';
    workers.forEach(worker => {
        tbody += `<tr><td class="name-col">${h(worker)}</td>`;
        let total = 0;
        for (let d = 1; d <= days; d++) {
            const ds = dateStr(curMonth, d);
            const items = data.entries.filter(e => e.date === ds && e.worker === worker);
            if (items.length === 0) {
                tbody += '<td></td>';
            } else {
                const dTotal = items.reduce((s, e) => s + e.gongsu, 0);
                total += dTotal;
                const inner = items.map(e => `<span class="p-site">${h(e.site)}</span><br><b>${e.gongsu}</b>`).join('<hr>');
                tbody += `<td>${inner}</td>`;
            }
        }
        tbody += `<td class="total-col">${total > 0 ? total : ''}</td></tr>`;
    });

    // 열 수에 따라 zoom 자동 계산 (가로 A4 기준 270mm)
    const totalCols = days + 2;
    const namePx = 52, totalPx = 32, dayPx = 20;
    const tableWidthPx = namePx + totalPx + (days * dayPx);
    const pagePx = 1020; // A4 가로 약 297mm @ 96dpi 기준 여백 제외
    const zoom = Math.min(1, pagePx / tableWidthPx);

    const html = `<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<style>
  @page { size: 297mm 210mm; margin: 8mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', Arial, sans-serif; }
  h2 { font-size: 10pt; margin-bottom: 5px; text-align: center; }
  .wrap { zoom: ${zoom}; transform-origin: top left; }
  table { border-collapse: collapse; table-layout: fixed; white-space: nowrap; }
  th { background: #1a3a5c; color: white; padding: 4px 2px; font-size: 7pt; border: 1px solid #335; text-align: center; width: ${dayPx}px; }

/* ── 설정/백업 ── */
function openSettings() { document.getElementById('settings-overlay').classList.add('open'); }
function closeSettings() { document.getElementById('settings-overlay').classList.remove('open'); }

async function shareBackup() {
    const data = load();
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob(['﻿' + json], { type: 'application/json;charset=utf-8' });
    const file = new File([blob], `공수백업_${curMonth}.json`, { type: 'application/json' });

    if (!navigator.share) {
        toast('이 브라우저는 공유 기능을 지원하지 않아요. 파일 다운로드를 이용해주세요.');
        return;
    }
    try {
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ title: `공수 백업 ${curMonth}`, files: [file] });
        } else {
            await navigator.share({ title: `공수 백업 ${curMonth}`, text: json });
        }
    } catch (err) {
        if (err.name !== 'AbortError') toast('공유에 실패했어요');
    }
}

function exportBackup() {
    const data = load();
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob(['﻿' + json], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `공수백업_${curMonth}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('백업 파일이 다운로드됐어요 📥');
}

function importBackup() {
    document.getElementById('import-file').click();
}
document.getElementById('import-file').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data.workers) || !Array.isArray(data.entries)) throw new Error();
            if (!confirm('현재 데이터를 백업 파일로 덮어쓸까요?')) return;
            save(data);
            render();
            closeSettings();
            toast('백업을 불러왔어요 ✓');
        } catch { toast('파일을 읽을 수 없어요. 올바른 백업 파일인지 확인해주세요.'); }
    };
    reader.readAsText(file);
    this.value = '';
});

function resetAll() {
    if (!confirm('모든 데이터가 삭제돼요. 정말 초기화할까요?')) return;
    localStorage.removeItem('gongsu2');
    closeSettings();
    render();
    toast('초기화됐어요');
}

/* ── 모달 바깥 클릭 닫기 ── */
document.getElementById('cell-overlay').addEventListener('click', e => { if (e.target.id === 'cell-overlay') closeCell(); });
document.getElementById('worker-overlay').addEventListener('click', e => { if (e.target.id === 'worker-overlay') closeWorker(); });
document.getElementById('settings-overlay').addEventListener('click', e => { if (e.target.id === 'settings-overlay') closeSettings(); });

/* ── 토스트 ── */
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2100);
}

/* ── 시작 ── */
const now = new Date();
curMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
document.getElementById('month-input').value = curMonth;
document.getElementById('month-input').addEventListener('change', e => {
    curMonth = e.target.value;
    render();
});
render();
</script>
